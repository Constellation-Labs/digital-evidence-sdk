name: CI

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main, dev]

jobs:
  typescript:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: packages/typescript/package-lock.json

      - name: Install metakit-sdk dependencies
        working-directory: vendor/metakit-sdk/packages/typescript
        run: npm ci

      - name: Build metakit-sdk
        working-directory: vendor/metakit-sdk/packages/typescript
        run: npm run build

      - name: Install dependencies
        working-directory: packages/typescript
        run: npm ci

      - name: Build
        working-directory: packages/typescript
        run: npm run build

      - name: Test
        working-directory: packages/typescript
        run: npm test

  python:
    name: Python
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Create venv and install
        working-directory: packages/python
        run: |
          python -m venv .venv
          .venv/bin/pip install -e ../../vendor/metakit-sdk/packages/python
          .venv/bin/pip install -e ".[dev]"

      - name: Test
        working-directory: packages/python
        run: .venv/bin/pytest tests/ -v
