name: CI

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main, dev]

jobs:
  typescript:
    name: TypeScript
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: packages/typescript/package-lock.json

      - name: Install dependencies
        working-directory: packages/typescript
        run: npm ci

      - name: Lint
        working-directory: packages/typescript
        run: npm run lint

      - name: Format check
        working-directory: packages/typescript
        run: npm run format:check

      - name: Build
        working-directory: packages/typescript
        run: npm run build

      - name: Test
        working-directory: packages/typescript
        run: npm test

  mcp-server:
    name: MCP Server
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: packages/mcp-server/package-lock.json

      - name: Install dependencies
        working-directory: packages/mcp-server
        run: npm ci

      - name: Build
        working-directory: packages/mcp-server
        run: npm run build

  typescript-x402:
    name: TypeScript x402
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: packages/typescript-x402/package-lock.json

      - name: Build base SDK
        working-directory: packages/typescript
        run: |
          npm ci
          npm run build

      - name: Install dependencies
        working-directory: packages/typescript-x402
        run: |
          npm ci
          npm link ../typescript

      - name: Build
        working-directory: packages/typescript-x402
        run: npm run build

      - name: Test
        working-directory: packages/typescript-x402
        run: npm test

  python:
    name: Python
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: packages/python/pyproject.toml

      - name: Install dependencies
        working-directory: packages/python
        run: pip install -e ".[dev]"

      - name: Test
        working-directory: packages/python
        run: pytest tests/ -v

  python-x402:
    name: Python x402
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: packages/python-x402/pyproject.toml

      - name: Install dependencies
        working-directory: packages/python-x402
        run: |
          pip install -e "../python[network]"
          pip install -e ".[dev]"

      - name: Test
        working-directory: packages/python-x402
        run: pytest tests/ -v
